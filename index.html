<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Packing &amp; Wardrobe</title>
<style>
  :root{
    --bg:#f6f6f4; --card:#ffffff; --ink:#1c1c1e; --muted:#6b6b70; --line:#e6e6e2;
    --accent:#2f6f4f; --accent-ink:#fff; --chip:#eef0ee; --danger:#b3261e;
    --need:#b26a00; --need-bg:#fdf3e2; --have:#2f6f4f; --packed-bg:#eaf4ee; --shadow:0 1px 3px rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#141416; --card:#1e1e21; --ink:#f2f2f5; --muted:#9a9aa2; --line:#2c2c31;
      --accent:#4f9e73; --chip:#26262b; --need:#e0a24a; --need-bg:#2a2318; --packed-bg:#1c2a22; --shadow:0 1px 3px rgba(0,0,0,.4);}
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%; padding-bottom:104px;}
  header{position:sticky; top:0; z-index:5; background:var(--bg); border-bottom:1px solid var(--line);
    padding:12px 16px calc(env(safe-area-inset-top) + 8px);}
  h1{font-size:19px; margin:0 0 8px; letter-spacing:.2px; display:flex; align-items:center; gap:8px}
  .summary{display:flex; gap:6px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin-bottom:10px}
  .summary b{color:var(--ink)}
  .stat{background:var(--chip); border-radius:999px; padding:3px 9px}
  .search{width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:10px; background:var(--card);
    color:var(--ink); font-size:15px; margin-bottom:8px}
  .tabs{display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap; border:1px solid var(--line); background:var(--card); color:var(--muted);
    padding:6px 12px; border-radius:999px; font-size:13px; cursor:pointer; flex:0 0 auto}
  .tab.active{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
  main{padding:12px 16px; max-width:720px; margin:0 auto}
  .empty{color:var(--muted); text-align:center; padding:48px 12px; font-size:14px}
  .item{display:flex; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:10px; margin-bottom:10px; box-shadow:var(--shadow); position:relative}
  .item.packed{background:var(--packed-bg)}
  .thumb{width:78px; height:78px; border-radius:10px; object-fit:cover; background:var(--chip); flex:0 0 auto}
  .thumb.ph{display:flex; align-items:center; justify-content:center; font-size:26px}
  .body{flex:1; min-width:0}
  .name{font-weight:600; font-size:15px; line-height:1.25; margin:0 0 2px}
  .meta{font-size:12.5px; color:var(--muted); line-height:1.5; word-break:break-word}
  .badges{display:flex; gap:5px; flex-wrap:wrap; margin-top:6px}
  .badge{font-size:11px; padding:2px 7px; border-radius:999px; background:var(--chip); color:var(--muted)}
  .badge.need{background:var(--need-bg); color:var(--need); font-weight:600}
  .badge.spec{background:var(--need-bg); color:var(--need)}
  .badge.cat{background:var(--chip)}
  .badge a{color:inherit}
  .row{display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap}
  .btn{border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:9px;
    padding:6px 10px; font-size:13px; cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
  .btn.ghost{background:transparent}
  .btn.mini{padding:4px 8px; font-size:12px}
  .pack{display:flex; align-items:center; gap:7px; font-size:13.5px; cursor:pointer; user-select:none}
  .pack input{width:20px; height:20px; accent-color:var(--accent)}
  .del{position:absolute; top:8px; right:8px; border:none; background:transparent; color:var(--muted);
    font-size:16px; cursor:pointer; padding:4px; line-height:1}
  /* outfits */
  .otiles{display:grid; grid-template-columns:repeat(auto-fill,minmax(78px,1fr)); gap:8px; margin-top:10px; cursor:pointer}
  .otile{width:46px; height:46px; border-radius:8px; object-fit:cover; background:var(--chip); flex:0 0 auto}
  .otile.ph{display:flex; align-items:center; justify-content:center; font-size:20px}
  .otiles .otile{width:100%; height:auto; aspect-ratio:1; border-radius:10px}
  .otiles .otile.ph{font-size:28px}
  .odtaphint{font-size:11px; color:var(--muted); margin-top:6px}
  /* outfit detail (big view) */
  .odGrid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:12px}
  .odItem{background:var(--chip); border-radius:12px; overflow:hidden; box-shadow:var(--shadow)}
  .odItem img{width:100%; aspect-ratio:3/4; object-fit:cover; display:block; background:var(--card)}
  .odItem .odph{width:100%; aspect-ratio:3/4; display:flex; align-items:center; justify-content:center; font-size:40px; background:var(--card)}
  .odcap{padding:8px 10px; font-size:12.5px; line-height:1.35}
  .odcap b{font-weight:600}
  .outfit{flex-direction:column; align-items:stretch}
  .picklist{max-height:46vh; overflow:auto; border:1px solid var(--line); border-radius:10px; padding:6px; margin-top:4px}
  .pick-item{display:flex; align-items:center; gap:10px; padding:6px; border-radius:8px; cursor:pointer}
  .pick-item:hover{background:var(--chip)}
  .pick-item input{width:18px; height:18px; accent-color:var(--accent); flex:0 0 auto}
  .fab{position:fixed; right:18px; bottom:calc(env(safe-area-inset-bottom) + 18px); z-index:6;
    background:var(--accent); color:var(--accent-ink); border:none; width:56px; height:56px; border-radius:50%;
    font-size:28px; box-shadow:0 4px 14px rgba(0,0,0,.25); cursor:pointer}
  .bar{position:fixed; left:0; bottom:0; z-index:6; width:100%; display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    padding:8px 16px calc(env(safe-area-inset-bottom) + 8px); background:var(--bg); border-top:1px solid var(--line)}
  .bar .btn{font-size:12px}
  .ver{flex-basis:100%; text-align:center; font-size:10.5px; color:var(--muted); margin-top:1px}
  /* modal */
  .modal{position:fixed; inset:0; z-index:20; background:rgba(0,0,0,.45); display:none; align-items:flex-end; justify-content:center}
  .modal.open{display:flex}
  .sheet{background:var(--card); width:100%; max-width:560px; max-height:92vh; overflow:auto; border-radius:16px 16px 0 0; padding:16px 16px 24px}
  @media(min-width:560px){ .modal{align-items:center} .sheet{border-radius:16px} }
  .sheet h2{margin:0 0 12px; font-size:17px}
  label{display:block; font-size:12px; color:var(--muted); margin:10px 0 4px}
  input[type=text],input[type=number],select,textarea{width:100%; padding:9px 11px; border:1px solid var(--line);
    border-radius:10px; background:var(--bg); color:var(--ink); font-size:15px; font-family:inherit}
  textarea{min-height:60px; resize:vertical}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .seg{display:flex; gap:6px; margin-top:4px}
  .seg button{flex:1; padding:9px; border:1px solid var(--line); background:var(--bg); color:var(--muted); border-radius:10px; font-size:14px; cursor:pointer}
  .seg button.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
  .photoRow{display:flex; align-items:center; gap:12px; margin-top:8px}
  .photoPrev{width:64px; height:64px; border-radius:10px; object-fit:cover; background:var(--chip)}
  .needOnly,.haveOnly{display:none}
  .sheet.mode-need .needOnly{display:block}
  .sheet.mode-have .haveOnly{display:block}
  .actions{display:flex; gap:10px; margin-top:18px}
  .actions .btn{flex:1; padding:11px; font-size:15px}
  .hint{font-size:11px; color:var(--muted); margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>🧳 Packing &amp; Wardrobe</h1>
  <div class="summary" id="summary"></div>
  <input class="search" id="search" placeholder="Search name, brand, size, notes…">
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="topack">To Pack</button>
    <button class="tab" data-tab="packed">Packed</button>
    <button class="tab" data-tab="shopping">Shopping</button>
    <button class="tab" data-tab="outfits">Outfits</button>
    <button class="tab" data-tab="all">All</button>
  </div>
</header>
<main id="list"></main>

<button class="fab" id="addBtn" title="Add">＋</button>
<div class="bar">
  <button class="btn" id="updateBtn" title="Reload the latest version from the web">⟳ Update</button>
  <button class="btn" id="backupBtn">⬇︎ Backup (JSON)</button>
  <button class="btn" id="restoreBtn">⬆︎ Restore</button>
  <input type="file" id="restoreFile" accept="application/json" hidden>
  <span class="ver" id="verStamp"></span>
</div>

<!-- Add/Edit item modal -->
<div class="modal" id="modal">
  <form class="sheet" id="form">
    <h2 id="formTitle">Add item</h2>
    <input type="hidden" id="f_id">
    <div class="seg" id="statusSeg">
      <button type="button" data-status="have" class="on">Have it</button>
      <button type="button" data-status="need">Need / Buy</button>
    </div>

    <label>Name</label>
    <input type="text" id="f_name" placeholder="e.g. Linen easy shorts" required>

    <div class="grid2">
      <div><label>Brand</label><input type="text" id="f_brand"></div>
      <div><label>Category</label>
        <select id="f_category">
          <option>Shorts</option><option>Pants</option><option>Shirt</option>
          <option>Polo / Knit</option><option>Tee</option><option>Tank</option>
          <option>Jersey</option><option>Outerwear</option><option>Shoes</option>
          <option>Accessory</option><option>Other</option>
        </select>
      </div>
    </div>

    <div class="grid2">
      <div><label>Size</label><input type="text" id="f_size" placeholder="S / M / W29…"></div>
      <div><label>Price</label><input type="number" id="f_price" step="0.01" placeholder="0.00"></div>
    </div>

    <div class="grid2 needOnly">
      <div><label>Quantity</label><input type="number" id="f_qty" min="1" value="1"></div>
      <div><label>Where to get it</label><input type="text" id="f_store" placeholder="Store"></div>
    </div>
    <div class="needOnly">
      <label>How specific is it?</label>
      <div class="seg" id="specSeg">
        <button type="button" data-spec="1" class="on">Specific item</button>
        <button type="button" data-spec="0">Just an idea / gap</button>
      </div>
    </div>

    <div class="grid2">
      <div><label>SKU / Style #</label><input type="text" id="f_sku"></div>
      <div><label>Link (URL)</label><input type="text" id="f_url" placeholder="https://…"></div>
    </div>

    <label>Notes</label>
    <textarea id="f_notes"></textarea>

    <label>Photo</label>
    <div class="photoRow">
      <img class="photoPrev" id="f_photoPrev" alt="" style="display:none">
      <div>
        <input type="file" id="f_photo" accept="image/*">
        <div class="hint">Take a photo or attach one — it's shrunk &amp; stored in the app.</div>
      </div>
      <button type="button" class="btn mini ghost" id="f_photoClear" style="display:none">Remove</button>
    </div>

    <div class="actions">
      <button type="button" class="btn ghost" id="cancelBtn">Cancel</button>
      <button type="submit" class="btn primary">Save</button>
    </div>
  </form>
</div>

<!-- Add/Edit outfit modal -->
<div class="modal" id="omodal">
  <form class="sheet" id="oform">
    <h2 id="oformTitle">New outfit</h2>
    <input type="hidden" id="o_id">
    <label>Outfit name</label>
    <input type="text" id="o_name" placeholder="e.g. Beach day, Dinner out" required>
    <label>Pick the pieces</label>
    <div id="o_items" class="picklist"></div>
    <div class="actions">
      <button type="button" class="btn ghost" id="oCancel">Cancel</button>
      <button type="submit" class="btn primary">Save outfit</button>
    </div>
  </form>
</div>

<!-- Outfit detail (big view) modal -->
<div class="modal" id="odmodal">
  <div class="sheet">
    <h2 id="odTitle">Outfit</h2>
    <div class="meta" id="odMeta"></div>
    <div class="odGrid" id="odGrid"></div>
    <div class="actions">
      <button type="button" class="btn ghost" id="odClose">Close</button>
      <button type="button" class="btn primary" id="odEdit">Edit outfit</button>
    </div>
  </div>
</div>

const BUILD = "2026-07-18 · 21:33";
const KEY = "packing_wardrobe_v14";
const OKEY = "packing_wardrobe_outfits";
let items = [];
let outfits = [];
let activeTab = "topack";
let editingPhoto = undefined; // undefined=unchanged, null=cleared, string=new dataURI
let formStatus = "have", formSpec = 1;

function load(){
  try{ const raw = localStorage.getItem(KEY); items = raw ? JSON.parse(raw) : SEED.slice(); }
  catch(e){ items = SEED.slice(); }
  if(!localStorage.getItem(KEY)) save();
  try{ outfits = JSON.parse(localStorage.getItem(OKEY)) || []; }catch(e){ outfits = []; }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); }
function saveOutfits(){ localStorage.setItem(OKEY, JSON.stringify(outfits)); }
function uid(){ return "i"+Math.random().toString(36).slice(2,9); }
function money(n){ n=Number(n)||0; return n? "$"+n.toFixed(2):""; }
function phEmoji(i){ if(i.status==="need") return "🛒"; if((i.category||"").toLowerCase().includes("shoe")) return "👟"; if((i.category||"").toLowerCase().includes("accessor")) return "🧢"; return "👕"; }

function summary(){
  const have = items.filter(i=>i.status==="have");
  const topack = have.filter(i=>!i.packed).length;
  const packed = have.filter(i=>i.packed).length;
  const need = items.filter(i=>i.status==="need");
  const toBuy = need.reduce((s,i)=>s+(Number(i.qty)||1),0);
  const owned = have.reduce((s,i)=>s+(Number(i.price)||0),0);
  const spend = need.reduce((s,i)=>s+((Number(i.price)||0)*(Number(i.qty)||1)),0);
  document.getElementById("summary").innerHTML =
    `<span class="stat"><b>${topack}</b> to pack</span>`+
    `<span class="stat"><b>${packed}</b> packed</span>`+
    `<span class="stat"><b>${toBuy}</b> to buy</span>`+
    (outfits.length?`<span class="stat"><b>${outfits.length}</b> outfits</span>`:"")+
    (owned?`<span class="stat"><b>$${owned.toFixed(0)}</b> owned</span>`:"")+
    (spend?`<span class="stat"><b>~$${spend.toFixed(0)}</b> to spend</span>`:"");
}

function matchTab(i){
  if(activeTab==="all") return true;
  if(activeTab==="shopping") return i.status==="need";
  if(activeTab==="topack") return i.status==="have" && !i.packed;
  if(activeTab==="packed") return i.status==="have" && i.packed;
  return true;
}
function matchSearch(i,q){
  if(!q) return true;
  return (i.name+" "+i.brand+" "+i.size+" "+i.category+" "+i.sku+" "+i.notes).toLowerCase().includes(q);
}

function render(){
  summary();
  const search = document.getElementById("search");
  if(activeTab==="outfits"){ search.style.display="none"; renderOutfits(); return; }
  search.style.display="";
  const q = search.value.trim().toLowerCase();
  const list = document.getElementById("list");
  const shown = items.filter(i=>matchTab(i)&&matchSearch(i,q));
  if(!shown.length){ list.innerHTML = `<div class="empty">Nothing here yet.<br>Tap ＋ to add an item.</div>`; return; }
  list.innerHTML = shown.map(cardHTML).join("");
}

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function cardHTML(i){
  const thumb = i.photo
    ? `<img class="thumb" src="${i.photo}" alt="">`
    : `<div class="thumb ph">${phEmoji(i)}</div>`;
  const price = money(i.price);
  const metaBits = [i.brand, i.size?("Size "+i.size):"", price].filter(Boolean).join(" · ");
  const badges = [];
  badges.push(`<span class="badge cat">${esc(i.category||"Other")}</span>`);
  if(i.status==="need"){
    badges.push(`<span class="badge need">NEED${(Number(i.qty)||1)>1?" ×"+i.qty:""}</span>`);
    badges.push(`<span class="badge spec">${i.specific?"Specific":"Idea / gap"}</span>`);
    if(i.store) badges.push(`<span class="badge">@ ${esc(i.store)}</span>`);
  }
  if(i.sku) badges.push(`<span class="badge">#${esc(i.sku)}</span>`);
  if(i.url) badges.push(`<span class="badge"><a href="${esc(i.url)}" target="_blank" rel="noopener">link ↗</a></span>`);

  let controls = "";
  if(i.status==="have"){
    controls = `<label class="pack"><input type="checkbox" ${i.packed?"checked":""} onchange="togglePack('${i.id}')"> Packed</label>
      <button class="btn mini" onclick="editItem('${i.id}')">Edit</button>`;
  } else {
    controls = `<button class="btn mini primary" onclick="gotIt('${i.id}')">Got it →</button>
      <button class="btn mini" onclick="editItem('${i.id}')">Edit</button>`;
  }
  return `<div class="item ${i.packed&&i.status==='have'?'packed':''}">
    ${thumb}
    <div class="body">
      <button class="del" onclick="delItem('${i.id}')" title="Delete">✕</button>
      <p class="name">${esc(i.name)}</p>
      <div class="meta">${esc(metaBits)}${i.notes?("<br>"+esc(i.notes)):""}</div>
      <div class="badges">${badges.join("")}</div>
      <div class="row">${controls}</div>
    </div>
  </div>`;
}

function renderOutfits(){
  const list = document.getElementById("list");
  let html = `<button class="btn primary" id="newOutfitBtn" style="margin-bottom:12px">＋ New outfit</button>`;
  if(!outfits.length){
    html += `<div class="empty">No outfits yet.<br>Bundle a few clothes into a look you can pack as one.</div>`;
  } else {
    html += outfits.map(o=>{
      const members = o.itemIds.map(id=>items.find(x=>x.id===id)).filter(Boolean);
      const packed = members.filter(m=>m.packed).length;
      const tiles = members.map(m=> m.photo
        ? `<img class="otile" src="${m.photo}" title="${esc(m.name)}">`
        : `<div class="otile ph" title="${esc(m.name)}">${phEmoji(m)}</div>`).join("");
      const allPacked = members.length && packed===members.length;
      return `<div class="item outfit">
        <button class="del" onclick="delOutfit('${o.id}')" title="Delete">✕</button>
        <p class="name" onclick="openOutfitDetail('${o.id}')" style="cursor:pointer">${esc(o.name)} ${allPacked?"✅":""}</p>
        <div class="meta">${members.length} item${members.length!==1?"s":""} · ${packed}/${members.length} packed</div>
        <div class="otiles" onclick="openOutfitDetail('${o.id}')">${tiles||'<span class="meta">No items yet</span>'}</div>
        <div class="odtaphint">Tap to open the full look ↗</div>
        <div class="row"><button class="btn mini" onclick="openOutfitDetail('${o.id}')">View ↗</button><button class="btn mini" onclick="editOutfit('${o.id}')">Edit</button></div>
      </div>`;
    }).join("");
  }
  list.innerHTML = html;
  document.getElementById("newOutfitBtn").onclick = ()=>openOutfitForm(null);
}

// item actions
window.togglePack=function(id){ const i=items.find(x=>x.id===id); if(i){ i.packed=!i.packed; save(); render(); } };
window.gotIt=function(id){ const i=items.find(x=>x.id===id); if(i){ i.status="have"; i.packed=false; save(); render(); } };
window.delItem=function(id){ const i=items.find(x=>x.id===id); if(i && confirm("Delete “"+i.name+"”?")){ items=items.filter(x=>x.id!==id); save(); render(); } };
window.editItem=function(id){ openForm(items.find(x=>x.id===id)); };
// outfit actions
window.editOutfit=function(id){ openOutfitForm(outfits.find(o=>o.id===id)); };
window.openOutfitDetail=function(id){
  const o=outfits.find(x=>x.id===id); if(!o) return;
  const members=o.itemIds.map(mid=>items.find(x=>x.id===mid)).filter(Boolean);
  const packed=members.filter(m=>m.packed).length;
  document.getElementById("odTitle").textContent=o.name;
  document.getElementById("odMeta").textContent=`${members.length} piece${members.length!==1?"s":""} · ${packed}/${members.length} packed`;
  document.getElementById("odGrid").innerHTML = members.length ? members.map(m=>`
    <div class="odItem">
      ${m.photo?`<img src="${m.photo}" alt="">`:`<div class="odph">${phEmoji(m)}</div>`}
      <div class="odcap"><b>${esc(m.name)}</b>${m.size?` <span class="meta">· ${esc(m.size)}</span>`:""}${m.packed?" ✅":""}</div>
    </div>`).join("") : `<div class="meta" style="padding:8px 2px">No pieces yet — tap Edit outfit to add some.</div>`;
  document.getElementById("odEdit").onclick=()=>{ document.getElementById("odmodal").classList.remove("open"); openOutfitForm(o); };
  document.getElementById("odmodal").classList.add("open");
};
window.delOutfit=function(id){ const o=outfits.find(x=>x.id===id); if(o && confirm("Delete outfit “"+o.name+"”?")){ outfits=outfits.filter(x=>x.id!==id); saveOutfits(); render(); } };

// item form
const modal=document.getElementById("modal"), form=document.getElementById("form"), sheet=form;
function setStatus(s){ formStatus=s; sheet.classList.toggle("mode-need",s==="need"); sheet.classList.toggle("mode-have",s==="have");
  document.querySelectorAll("#statusSeg button").forEach(b=>b.classList.toggle("on",b.dataset.status===s)); }
function setSpec(v){ formSpec=v; document.querySelectorAll("#specSeg button").forEach(b=>b.classList.toggle("on",Number(b.dataset.spec)===v)); }

function openForm(i){
  form.reset(); editingPhoto=undefined;
  document.getElementById("f_id").value = i? i.id : "";
  document.getElementById("formTitle").textContent = i? "Edit item":"Add item";
  setStatus(i? i.status:"have"); setSpec(i&&i.specific===false?0:1);
  if(i){
    f_name.value=i.name||""; f_brand.value=i.brand||""; f_category.value=i.category||"Other";
    f_size.value=i.size||""; f_price.value=i.price||""; f_qty.value=i.qty||1; f_store.value=i.store||"";
    f_sku.value=i.sku||""; f_url.value=i.url||""; f_notes.value=i.notes||"";
  }
  const prev=document.getElementById("f_photoPrev"), clr=document.getElementById("f_photoClear");
  if(i&&i.photo){ prev.src=i.photo; prev.style.display="block"; clr.style.display="inline-block"; }
  else { prev.style.display="none"; clr.style.display="none"; }
  modal.classList.add("open");
}
function closeForm(){ modal.classList.remove("open"); }

document.getElementById("addBtn").onclick=()=>{ if(activeTab==="outfits") openOutfitForm(null); else openForm(null); };
document.getElementById("cancelBtn").onclick=closeForm;
modal.onclick=e=>{ if(e.target===modal) closeForm(); };
document.querySelectorAll("#statusSeg button").forEach(b=>b.onclick=()=>setStatus(b.dataset.status));
document.querySelectorAll("#specSeg button").forEach(b=>b.onclick=()=>setSpec(Number(b.dataset.spec)));

// photo handling: downscale to <=900px jpeg
document.getElementById("f_photo").onchange=function(e){
  const file=e.target.files[0]; if(!file) return;
  const img=new Image(), rd=new FileReader();
  rd.onload=()=>{ img.onload=()=>{
    const max=900, sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement("canvas"); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    editingPhoto=c.toDataURL("image/jpeg",0.8);
    const prev=document.getElementById("f_photoPrev"); prev.src=editingPhoto; prev.style.display="block";
    document.getElementById("f_photoClear").style.display="inline-block";
  }; img.src=rd.result; };
  rd.readAsDataURL(file);
};
document.getElementById("f_photoClear").onclick=function(){
  editingPhoto=null; const prev=document.getElementById("f_photoPrev");
  prev.style.display="none"; this.style.display="none"; document.getElementById("f_photo").value="";
};

form.onsubmit=function(e){
  e.preventDefault();
  const id=document.getElementById("f_id").value;
  let i = id? items.find(x=>x.id===id) : {id:uid(), packed:false, photo:null};
  i.status=formStatus; i.name=f_name.value.trim(); i.brand=f_brand.value.trim();
  i.category=f_category.value; i.size=f_size.value.trim(); i.price=parseFloat(f_price.value)||"";
  i.qty=formStatus==="need"?(parseInt(f_qty.value)||1):undefined;
  i.store=formStatus==="need"?f_store.value.trim():undefined;
  i.specific=formStatus==="need"?!!formSpec:undefined;
  i.sku=f_sku.value.trim(); i.url=f_url.value.trim(); i.notes=f_notes.value.trim();
  if(editingPhoto!==undefined) i.photo=editingPhoto;
  if(!id) items.unshift(i);
  save(); closeForm(); render();
};

// outfit form
const omodal=document.getElementById("omodal"), oform=document.getElementById("oform");
function openOutfitForm(o){
  oform.reset();
  document.getElementById("o_id").value = o? o.id : "";
  document.getElementById("oformTitle").textContent = o? "Edit outfit":"New outfit";
  document.getElementById("o_name").value = o? o.name : "";
  const sel = new Set(o? o.itemIds : []);
  const have = items.filter(i=>i.status==="have");
  document.getElementById("o_items").innerHTML = have.length ? have.map(i=>`
    <label class="pick-item">
      <input type="checkbox" value="${i.id}" ${sel.has(i.id)?"checked":""}>
      ${i.photo?`<img class="otile" src="${i.photo}">`:`<div class="otile ph">${phEmoji(i)}</div>`}
      <span>${esc(i.name)}${i.size?` <span class="meta">· ${esc(i.size)}</span>`:""}</span>
    </label>`).join("") : `<div class="meta" style="padding:8px">Add some clothes first, then build an outfit.</div>`;
  omodal.classList.add("open");
}
document.getElementById("oCancel").onclick=()=>omodal.classList.remove("open");
omodal.onclick=e=>{ if(e.target===omodal) omodal.classList.remove("open"); };
const odmodal=document.getElementById("odmodal");
document.getElementById("odClose").onclick=()=>odmodal.classList.remove("open");
odmodal.onclick=e=>{ if(e.target===odmodal) odmodal.classList.remove("open"); };
oform.onsubmit=function(e){
  e.preventDefault();
  const id=document.getElementById("o_id").value;
  const ids=[...document.querySelectorAll("#o_items input:checked")].map(c=>c.value);
  const name=document.getElementById("o_name").value.trim();
  if(id){ const o=outfits.find(x=>x.id===id); if(o){ o.name=name; o.itemIds=ids; } }
  else { outfits.unshift({id:"o"+Math.random().toString(36).slice(2,9), name, itemIds:ids}); }
  saveOutfits(); omodal.classList.remove("open"); render();
};

// tabs / search
document.getElementById("tabs").onclick=e=>{ const t=e.target.closest(".tab"); if(!t) return;
  activeTab=t.dataset.tab; document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===t)); render(); };
document.getElementById("search").oninput=render;

// backup / restore  (items + outfits together)
document.getElementById("backupBtn").onclick=function(){
  const blob=new Blob([JSON.stringify({items,outfits},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="packing-list-backup.json"; a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById("restoreBtn").onclick=()=>document.getElementById("restoreFile").click();
document.getElementById("restoreFile").onchange=function(e){
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ try{ const data=JSON.parse(rd.result);
    const newItems = Array.isArray(data)? data : data.items;
    const newOutfits = Array.isArray(data)? [] : (data.outfits||[]);
    if(Array.isArray(newItems) && confirm("Replace current list with "+newItems.length+" items from this backup?")){
      items=newItems; outfits=newOutfits; save(); saveOutfits(); render(); }
  }catch(err){ alert("Couldn't read that file."); } };
  rd.readAsText(f); e.target.value="";
};

document.getElementById("verStamp").textContent = "Built " + BUILD;
document.getElementById("updateBtn").onclick=()=>{ location.replace(location.pathname + "?v=" + Date.now()); };

load(); render();
</script>
</body>
</html>
